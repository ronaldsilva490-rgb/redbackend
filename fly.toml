# fly.toml — configuração do app redbackend no Fly.io
# Deploy via: fly deploy  OU  push no GitHub (GitHub Action cuida do resto)

app            = 'redbackend'
primary_region = 'gru'

[build]

[http_service]
  internal_port       = 7860
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes           = ['app']

[[vm]]
  memory    = '256mb'
  cpus      = 1
  memory_mb = 256
