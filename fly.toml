app = "redbackend"
primary_region = "gru"

[build]

[env]
  WHATSAPP_PORT = "3001"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "whatsapp_data"
  destination = "/data/auth_info_baileys"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
